<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budżet Domowy</title>
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
</head>
<body>

  <!-- Ekran logowania -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">💰</div>
      <h1>Budżet Domowy</h1>
      <p class="login-sub">Zaloguj się kontem Google, aby zarządzać budżetem</p>
      <button id="login-google" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#4285F4" d="M45.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h11.8c-.5 2.8-2 5.1-4.4 6.7v5.5h7.1c4.2-3.8 6.6-9.5 6.6-16.2z"/>
          <path fill="#34A853" d="M24 46c6 0 11-2 14.6-5.3l-7.1-5.5c-2 1.3-4.5 2.1-7.5 2.1-5.8 0-10.6-3.9-12.4-9.1H4.3v5.7C7.9 41.1 15.4 46 24 46z"/>
          <path fill="#FBBC05" d="M11.6 28.2c-.5-1.3-.7-2.7-.7-4.2s.3-2.9.7-4.2v-5.7H4.3C2.8 17 2 20.4 2 24s.8 7 2.3 9.9l7.3-5.7z"/>
          <path fill="#EA4335" d="M24 10.7c3.3 0 6.2 1.1 8.5 3.3l6.3-6.3C35 4.1 30 2 24 2 15.4 2 7.9 6.9 4.3 14.1l7.3 5.7c1.8-5.2 6.6-9.1 12.4-9.1z"/>
        </svg>
        Zaloguj się przez Google
      </button>
      <p id="login-error" class="login-error"></p>
    </div>
  </div>

  <!-- Aplikacja -->
  <div id="app" hidden>
    <header class="topbar">
      <div class="brand">💰 <span>Budżet Domowy</span></div>

      <nav class="nav">
        <button class="nav-btn active" data-view="dash">Pulpit</button>
        <button class="nav-btn" data-view="budget">Ten miesiąc</button>
        <button class="nav-btn" data-view="charts">Wykresy</button>
        <button class="nav-btn" data-view="year">Plan roczny</button>
        <button class="nav-btn" data-view="goals">Cele</button>
      </nav>

      <div class="topbar-right">
        <span id="save-status" class="save-status"></span>
        <span id="user-email" class="user-email"></span>
        <button id="logout" class="btn-ghost">Wyloguj</button>
      </div>
    </header>

    <div class="month-switch">
      <button id="prev-month" class="btn-round" aria-label="Poprzedni miesiąc">‹</button>
      <h2 id="month-label">—</h2>
      <button id="next-month" class="btn-round" aria-label="Następny miesiąc">›</button>
      <div id="month-missing" class="month-missing" hidden>
        <span>Brak danych dla tego miesiąca.</span>
        <button id="create-month" class="btn-mini">Utwórz na podstawie poprzedniego</button>
        <button id="import-month" class="btn-mini">Wczytaj z arkusza</button>
      </div>
    </div>

    <main class="container">
      <div id="default-goal" class="default-goal" hidden></div>

      <section id="view-dash" class="view active"></section>
      <section id="view-budget" class="view"></section>
      <section id="view-charts" class="view"></section>
      <section id="view-year" class="view"></section>
      <section id="view-goals" class="view"></section>
    </main>

    <footer class="footer">Budżet Domowy · Mati &amp; Kinia</footer>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
